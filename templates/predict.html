<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <h1 class="text-xl font-bold text-blue-600">🌦 AI Weather</h1>
        <a href="/" class="text-blue-500">Home</a>
    </nav>

    <div class="max-w-6xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg">

        <form method="POST" enctype="multipart/form-data">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

                <!-- LEFT SIDE - IMAGE -->
                <div class="flex flex-col items-center">
                    
                    <h2 class="text-lg font-semibold mb-4">Upload Image</h2>

                    <input type="file" name="image" id="imageInput" 
                           class="mb-4" accept="image/*" required>

                    <!-- Preview -->
                    <img id="preview" src="#" 
                         class="hidden w-64 h-64 object-cover rounded-xl border shadow" />

                </div>

                <!-- RIGHT SIDE - NUMERIC -->
                <div>

                    <h2 class="text-lg font-semibold mb-4">Enter Weather Data</h2>

                    <div class="space-y-4">

                        <input type="number" step="any" name="temp"
                               placeholder="Temperature"
                               class="w-full p-3 border rounded-lg" required>

                        <input type="number" step="any" name="hum"
                               placeholder="Humidity"
                               class="w-full p-3 border rounded-lg" required>

                        <input type="number" step="any" name="press"
                               placeholder="Pressure"
                               class="w-full p-3 border rounded-lg" required>

                        <input type="number" step="any" name="wind"
                               placeholder="Wind Speed"
                               class="w-full p-3 border rounded-lg" required>

                    </div>

                </div>

            </div>

            <!-- CENTER BOTTOM -->
            <div class="text-center mt-10">

                <button type="submit"
                        class="bg-blue-600 text-white px-8 py-3 rounded-xl text-lg hover:bg-blue-700 transition">
                    Predict
                </button>

                {% if result %}
                    <div class="mt-6 text-xl font-bold text-green-600">
                        Prediction: {{ result }}
                    </div>
                {% endif %}

            </div>

        </form>

    </div>

    <!-- IMAGE PREVIEW SCRIPT -->
    <script>
        const input = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        input.addEventListener("change", function () {
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.classList.remove("hidden");
                };

                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
