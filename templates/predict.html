<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Weather Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body >

<div class="container">

    <h1 class="title">🌦 Hybrid Weather Prediction</h1>

    <form method="POST" enctype="multipart/form-data" class="glass-card flex>">

        <!-- LEFT: Image Upload -->
        <div class="left">
            <label>Upload Image</label>
            <input type="file" name="image" accept="image/*" onchange="previewImage(event)">

            <img id="preview" src="#" alt="Preview" style="display:none;">
        </div>

        <!-- RIGHT: Numeric Inputs -->
        <div class="right ml-10">
            <label>Temperature</label>
            <input type="number" step="any" name="temp" required>

            <label>Humidity</label>
            <input type="number" step="any" name="hum" required>

            <label>Pressure</label>
            <input type="float" step="any" name="press" required>

            <label>Wind Speed</label>
            <input type="number" step="any" name="wind" required>
        </div>

        <!-- BUTTON -->
        <div class="center">
            <button type="submit">Predict</button>
        </div>

    </form>

    <!-- RESULT -->
    {% if result %}
    <div class="result-box">
        🌤 Prediction: <span>{{ result }}</span>
    </div>
    {% endif %}

</div>

<script>
function previewImage(event) {
    const preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(event.target.files[0]);
    preview.style.display = 'block';
}
</script>

</body>
</html>
