        <a href="/" class="hover:text-blue-500">Home</a>
        <a href="/about" class="hover:text-blue-500">About</a>

<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-black text-white">

<!-- Navbar -->
<nav class="p-5 flex justify-between bg-white/10 backdrop-blur-lg">
    <h1 class="font-bold text-xl">🌦 AI Weather</h1>
    <a href="/" class="hover:text-gray-300">Home</a>
</nav>

<div class="max-w-6xl mx-auto mt-12 p-8 bg-white/10 backdrop-blur-lg rounded-2xl shadow-lg">

<form method="POST" enctype="multipart/form-data">

<div class="grid md:grid-cols-2 gap-10">

<!-- IMAGE SIDE -->
<div class="text-center">
    <h2 class="mb-4 text-lg">Upload Image</h2>

    <input type="file" name="image" id="imageInput" class="mb-4">

    <img id="preview" class="hidden w-64 h-64 mx-auto rounded-xl shadow-lg object-cover"/>
</div>

<!-- NUMERIC SIDE -->
<div class="space-y-4">

    <input type="number" name="temp" placeholder="Temperature"
           class="w-full p-3 rounded-lg bg-white/20 placeholder-gray-300">

    <input type="number" name="hum" placeholder="Humidity"
           class="w-full p-3 rounded-lg bg-white/20">

    <input type="number" name="press" placeholder="Pressure"
           class="w-full p-3 rounded-lg bg-white/20">

    <input type="number" name="wind" placeholder="Wind Speed"
           class="w-full p-3 rounded-lg bg-white/20">

</div>

</div>

<!-- BUTTON + RESULT -->
<div class="text-center mt-10">

    <button class="bg-blue-500 px-8 py-3 rounded-xl text-lg hover:bg-blue-600 transition">
        Predict
    </button>

    {% if result %}
    <div class="mt-6 text-2xl font-bold text-green-400">
        🌤 {{ result }}
    </div>
    {% endif %}

</div>

</form>

</div>

<script>
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.classList.remove("hidden");
        };
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
