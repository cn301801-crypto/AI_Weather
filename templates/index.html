<!DOCTYPE html>
<html>
<head>
    <title>Weather Prediction</title>
</head>
<body>

    <h1>Hybrid Weather Prediction</h1>

    <form method="POST" enctype="multipart/form-data">
        <label>Upload Image:</label>
        <input type="file" name="image"><br><br>

        <label>Temperature:</label>
        <input type="number" step="any" name="temp" required><br><br>

        <label>Humidity:</label>
        <input type="number" step="any" name="hum" required><br><br>

        <label>Pressure:</label>
        <input type="number" step="any" name="press" required><br><br>

        <label>Wind Speed:</label>
        <input type="number" step="any" name="wind" required><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Prediction: {{ result }}</h2>
    {% endif %}

</body>
</html>
